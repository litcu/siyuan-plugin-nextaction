<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextAction 标签页原型</title>
<style>
  :root {
    --b3-theme-primary: #3583eb;
    --b3-theme-background: #1e1e2e;
    --b3-theme-surface: #262637;
    --b3-theme-surface-hover: rgba(255,255,255,0.06);
    --b3-theme-on-surface: #d4d4d4;
    --b3-theme-on-surface-secondary: #8b8ba0;
    --b3-border-color: #363650;
    --na-priority-critical: #e74c3c;
    --na-priority-high: #e67e22;
    --na-priority-medium: #3498db;
    --na-priority-low: #95a5a6;
    --na-priority-none: transparent;
    --na-done-green: #27ae60;
    --nav-rail-width: 48px;
    --detail-width: 420px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--b3-theme-background); color: var(--b3-theme-on-surface); height: 100vh; overflow: hidden; }

  /* ===== Top bar (simulating SiYuan tab header) ===== */
  .tab-header {
    height: 36px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    background: var(--b3-theme-surface);
    border-bottom: 1px solid var(--b3-border-color);
    gap: 8px;
    font-size: 13px;
  }
  .tab-header__icon { color: var(--b3-theme-primary); font-size: 16px; }
  .tab-header__title { color: var(--b3-theme-on-surface); font-weight: 500; }

  /* ===== Main layout ===== */
  .app {
    display: flex;
    height: calc(100vh - 36px);
  }

  /* ===== Nav Rail ===== */
  .nav-rail {
    width: var(--nav-rail-width);
    background: var(--b3-theme-surface);
    border-right: 1px solid var(--b3-border-color);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 0;
    flex-shrink: 0;
  }
  .nav-rail__item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 8px 0;
    cursor: pointer;
    position: relative;
    color: var(--b3-theme-on-surface-secondary);
    transition: color 0.15s;
    border: none;
    background: none;
  }
  .nav-rail__item:hover { color: var(--b3-theme-on-surface); }
  .nav-rail__item.active {
    color: var(--b3-theme-primary);
  }
  .nav-rail__item.active::before {
    content: "";
    position: absolute;
    left: 0;
    top: 6px;
    bottom: 6px;
    width: 3px;
    background: var(--b3-theme-primary);
    border-radius: 0 2px 2px 0;
  }
  .nav-rail__icon { font-size: 18px; line-height: 1; }
  .nav-rail__label { font-size: 9px; margin-top: 3px; white-space: nowrap; }
  .nav-rail__spacer { flex: 1; }
  .nav-rail__action {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 6px;
    border: none;
    background: none;
    color: var(--b3-theme-on-surface-secondary);
    cursor: pointer;
    font-size: 16px;
    margin-bottom: 4px;
  }
  .nav-rail__action:hover { background: var(--b3-theme-surface-hover); color: var(--b3-theme-on-surface); }

  /* ===== Center pane ===== */
  .center-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
  }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--b3-border-color);
    background: var(--b3-theme-surface);
    align-items: center;
  }
  .filter-bar__search {
    flex: 1;
    background: var(--b3-theme-background);
    border: 1px solid var(--b3-border-color);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--b3-theme-on-surface);
    font-size: 13px;
    outline: none;
  }
  .filter-bar__search:focus { border-color: var(--b3-theme-primary); }
  .filter-bar__select {
    background: var(--b3-theme-background);
    border: 1px solid var(--b3-border-color);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--b3-theme-on-surface);
    font-size: 12px;
    outline: none;
  }

  /* Task list */
  .task-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
  }
  .task-list::-webkit-scrollbar { width: 6px; }
  .task-list::-webkit-scrollbar-thumb { background: var(--b3-border-color); border-radius: 3px; }

  /* Task card */
  .task-card {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    border-left: 3px solid transparent;
    margin-bottom: 2px;
    position: relative;
  }
  .task-card:hover { background: var(--b3-theme-surface-hover); }
  .task-card.selected {
    background: rgba(53, 131, 235, 0.08);
    border-left-color: var(--b3-theme-primary);
  }
  .task-card.overdue .task-card__due,
  .task-card.overdue .task-card__title { color: var(--na-priority-critical); }
  .task-card--done { opacity: 0.55; }
  .task-card--done .task-card__title { text-decoration: line-through; }
  .task-card--child { padding: 7px 12px 7px 32px; }

  .task-card__body { flex: 1; min-width: 0; }
  .task-card__title-row { display: flex; align-items: center; gap: 8px; }
  .task-card__title {
    font-size: 14px; line-height: 1.5;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0;
  }
  .task-card--root .task-card__title { font-weight: 500; }
  .task-card__title:hover { color: var(--b3-theme-primary); }
  .task-card__meta {
    font-size: 12px; color: var(--b3-theme-on-surface-secondary);
    margin-top: 3px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  }
  .task-card__due.overdue { color: var(--na-priority-critical); font-weight: 500; }
  .task-card__context { color: var(--b3-theme-on-surface-secondary); }
  .task-card__stats { color: var(--b3-theme-on-surface-secondary); font-size: 11px; }
  .task-card__priority-badge {
    font-size: 10px; padding: 1px 8px; border-radius: 10px; flex-shrink: 0; white-space: nowrap; font-weight: 500;
  }

  /* Status checkbox */
  .status-checkbox {
    display: inline-block; width: 18px; height: 18px; border-radius: 4px;
    border: 1.5px solid var(--b3-theme-on-surface-secondary); cursor: pointer; flex-shrink: 0;
    position: relative; vertical-align: middle;
  }
  .status-checkbox--doing { border-color: #3498db; background: linear-gradient(135deg, #3498db 50%, transparent 50%); }
  .status-checkbox--waiting { border-color: #5dade2; }
  .status-checkbox--done {
    background: var(--na-done-green); border-color: var(--na-done-green);
  }
  .status-checkbox--done::after {
    content: "✓"; color: #fff; font-size: 11px; position: absolute;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
  }

  /* Priority dot */
  .priority-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    border: 1.5px solid transparent; flex-shrink: 0; vertical-align: middle;
  }

  /* Completed section */
  .completed-divider {
    border-top: 1px solid var(--b3-border-color); margin: 12px 0 6px;
  }
  .completed-toggle {
    display: flex; align-items: center; gap: 6px; padding: 6px 12px;
    font-size: 12px; color: var(--b3-theme-on-surface-secondary); background: none; border: none;
    cursor: pointer; border-radius: 4px; width: 100%;
  }
  .completed-toggle:hover { background: var(--b3-theme-surface-hover); }
  .completed-count { color: var(--b3-theme-on-surface-secondary); font-size: 11px; }

  /* ===== Detail pane ===== */
  .detail-pane {
    width: 0;
    overflow: hidden;
    border-left: 1px solid var(--b3-border-color);
    background: var(--b3-theme-surface);
    transition: width 200ms ease;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .detail-pane.open {
    width: var(--detail-width);
  }
  .detail-pane__inner {
    width: var(--detail-width);
    min-width: var(--detail-width);
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  /* Detail header */
  .detail-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--b3-border-color);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .detail-header__top {
    display: flex; align-items: center; gap: 10px;
  }
  .detail-header__title {
    flex: 1; font-size: 18px; font-weight: 600; line-height: 1.4; min-width: 0;
    background: none; border: none; color: var(--b3-theme-on-surface); outline: none;
    border-bottom: 1px solid transparent; padding: 2px 0;
  }
  .detail-header__title:focus { border-bottom-color: var(--b3-theme-primary); }
  .detail-header__close {
    background: none; border: none; color: var(--b3-theme-on-surface-secondary);
    cursor: pointer; font-size: 18px; padding: 4px; line-height: 1;
    border-radius: 4px;
  }
  .detail-header__close:hover { background: var(--b3-theme-surface-hover); color: var(--b3-theme-on-surface); }
  .detail-header__meta {
    font-size: 12px; color: var(--b3-theme-on-surface-secondary); display: flex; gap: 12px;
  }

  /* Detail body */
  .detail-body {
    flex: 1; overflow-y: auto; padding: 16px 20px;
  }
  .detail-body::-webkit-scrollbar { width: 6px; }
  .detail-body::-webkit-scrollbar-thumb { background: var(--b3-border-color); border-radius: 3px; }

  .detail-field {
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 6px 12px;
    align-items: center;
    margin-bottom: 14px;
  }
  .detail-field__label {
    font-size: 12px; color: var(--b3-theme-on-surface-secondary); text-align: right;
  }
  .detail-field__value select,
  .detail-field__value input {
    width: 100%; background: var(--b3-theme-background); border: 1px solid var(--b3-border-color);
    border-radius: 6px; padding: 6px 10px; color: var(--b3-theme-on-surface); font-size: 13px; outline: none;
  }
  .detail-field__value select:focus,
  .detail-field__value input:focus { border-color: var(--b3-theme-primary); }

  /* Importance/effort dots */
  .dot-row { display: flex; gap: 6px; }
  .dot-row__dot {
    width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--b3-border-color);
    background: transparent; cursor: pointer;
  }
  .dot-row__dot.active { background: var(--b3-theme-primary); border-color: var(--b3-theme-primary); }
  .dot-row__dot:hover { opacity: 0.75; }

  /* Detail footer */
  .detail-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--b3-border-color);
    display: flex; justify-content: space-between; align-items: center;
  }
  .detail-footer__link {
    font-size: 12px; color: var(--b3-theme-primary); cursor: pointer; text-decoration: none;
  }
  .detail-footer__link:hover { text-decoration: underline; }
  .detail-footer__remove {
    font-size: 12px; color: var(--na-priority-critical); cursor: pointer; background: none; border: none;
    padding: 4px 8px; border-radius: 4px;
  }
  .detail-footer__remove:hover { background: rgba(231,76,60,0.1); }

  /* ===== Responsive ===== */
  @media (max-width: 900px) {
    :root { --detail-width: 320px; }
  }
</style>
</head>
<body>

<div class="tab-header">
  <span class="tab-header__icon">⚡</span>
  <span class="tab-header__title">今天干点啥</span>
</div>

<div class="app">
  <!-- Nav Rail -->
  <nav class="nav-rail">
    <button class="nav-rail__item active" data-view="next" onclick="switchView(this, 'next')">
      <span class="nav-rail__icon">⚡</span>
      <span class="nav-rail__label">下一步</span>
    </button>
    <button class="nav-rail__item" data-view="all" onclick="switchView(this, 'all')">
      <span class="nav-rail__icon">📋</span>
      <span class="nav-rail__label">全部</span>
    </button>
    <button class="nav-rail__item" data-view="project" onclick="switchView(this, 'project')">
      <span class="nav-rail__icon">📁</span>
      <span class="nav-rail__label">项目</span>
    </button>
    <div class="nav-rail__spacer"></div>
    <button class="nav-rail__action" title="重新计算优先级">↻</button>
  </nav>

  <!-- Center pane -->
  <div class="center-pane">
    <div class="filter-bar">
      <input class="filter-bar__search" placeholder="搜索任务..." />
      <select class="filter-bar__select"><option>所有上下文</option><option>@办公室</option><option>@电话</option><option>@电脑</option></select>
      <select class="filter-bar__select"><option>所有优先级</option><option>紧急</option><option>高</option><option>中</option><option>低</option></select>
    </div>
    <div class="task-list" id="taskList">
      <!-- filled by JS -->
    </div>
  </div>

  <!-- Detail pane -->
  <div class="detail-pane" id="detailPane">
    <div class="detail-pane__inner">
      <div class="detail-header">
        <div class="detail-header__top">
          <span class="status-checkbox status-checkbox--doing" id="detailStatus"></span>
          <input class="detail-header__title" id="detailTitle" value="" />
          <button class="detail-header__close" onclick="closeDetail()">✕</button>
        </div>
        <div class="detail-header__meta" id="detailMeta"></div>
      </div>
      <div class="detail-body">
        <div class="detail-field">
          <span class="detail-field__label">状态</span>
          <div class="detail-field__value">
            <select id="detailStatusSelect">
              <option value="todo">待办</option>
              <option value="doing" selected>进行中</option>
              <option value="waiting">等待</option>
              <option value="done">已完成</option>
            </select>
          </div>
        </div>
        <div class="detail-field">
          <span class="detail-field__label">优先级</span>
          <div class="detail-field__value">
            <select>
              <option>紧急</option>
              <option selected>高</option>
              <option>中</option>
              <option>低</option>
              <option>无</option>
            </select>
          </div>
        </div>
        <div class="detail-field">
          <span class="detail-field__label">重要性</span>
          <div class="detail-field__value">
            <div class="dot-row">
              <span class="dot-row__dot"></span>
              <span class="dot-row__dot"></span>
              <span class="dot-row__dot"></span>
              <span class="dot-row__dot"></span>
              <span class="dot-row__dot active"></span>
              <span class="dot-row__dot active"></span>
              <span class="dot-row__dot"></span>
            </div>
          </div>
        </div>
        <div class="detail-field">
          <span class="detail-field__label">工作量</span>
          <div class="detail-field__value">
            <div class="dot-row">
              <span class="dot-row__dot"></span>
              <span class="dot-row__dot"></span>
              <span class="dot-row__dot"></span>
              <span class="dot-row__dot active"></span>
              <span class="dot-row__dot"></span>
              <span class="dot-row__dot"></span>
              <span class="dot-row__dot"></span>
            </div>
          </div>
        </div>
        <div class="detail-field">
          <span class="detail-field__label">截止日期</span>
          <div class="detail-field__value">
            <input type="date" value="2026-07-10" />
          </div>
        </div>
        <div class="detail-field">
          <span class="detail-field__label">开始日期</span>
          <div class="detail-field__value">
            <input type="date" value="2026-07-05" />
          </div>
        </div>
        <div class="detail-field">
          <span class="detail-field__label">上下文</span>
          <div class="detail-field__value">
            <input type="text" value="@办公室, @电脑" placeholder="@办公室, @电话" />
          </div>
        </div>
        <div class="detail-field">
          <span class="detail-field__label">父任务</span>
          <div class="detail-field__value">
            <input type="text" value="Q3 产品规划" readonly style="background:var(--b3-theme-background);cursor:default;" />
          </div>
        </div>
      </div>
      <div class="detail-footer">
        <a class="detail-footer__link">↗ 跳转到块</a>
        <button class="detail-footer__remove">移除任务</button>
      </div>
    </div>
  </div>
</div>

<script>
const TASKS = [
  { id:1, title:"完成 Q3 产品规划文档", status:"doing", priority:"high", importance:6, effort:4, due:"2026-07-10", context:"@办公室|@电脑", overdue:true, root:true },
  { id:2, title:"审核设计稿并反馈", status:"todo", priority:"critical", importance:7, effort:2, due:"2026-07-06", context:"@办公室", overdue:true, root:false },
  { id:3, title:"准备周五演示材料", status:"todo", priority:"high", importance:5, effort:3, due:"2026-07-08", context:"@电脑", overdue:false, root:true },
  { id:4, title:"联系供应商确认报价", status:"waiting", priority:"medium", importance:4, effort:1, due:"2026-07-12", context:"@电话", overdue:false, root:true },
  { id:5, title:"更新用户手册第3章", status:"todo", priority:"low", importance:3, effort:5, due:"2026-07-20", context:"@电脑", overdue:false, root:true },
  { id:6, title:"团队周报整理", status:"done", priority:"medium", importance:3, effort:2, due:"2026-07-04", context:"@办公室", overdue:false, root:true },
  { id:7, title:"数据库索引优化", status:"done", priority:"high", importance:5, effort:4, due:"2026-07-03", context:"@电脑", overdue:false, root:true },
];

const PRIORITY_COLORS = { critical:"#e74c3c", high:"#e67e22", medium:"#3498db", low:"#95a5a6", none:"transparent" };
const PRIORITY_LABELS = { critical:"紧急", high:"高", medium:"中", low:"低", none:"无" };
const STATUS_LABELS = { todo:"待办", doing:"进行中", waiting:"等待", done:"已完成" };

let selectedId = null;

function renderTasks() {
  const list = document.getElementById("taskList");
  const activeTasks = TASKS.filter(t => t.status !== "done");
  const doneTasks = TASKS.filter(t => t.status === "done");

  let html = "";
  for (const t of activeTasks) {
    html += renderCard(t);
  }

  if (doneTasks.length > 0) {
    html += `<div class="completed-divider"></div>`;
    html += `<button class="completed-toggle" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
      <span>▼</span> 已完成 <span class="completed-count">(${doneTasks.length})</span>
    </button>`;
    html += `<div id="completedSection" style="display:none">`;
    for (const t of doneTasks) {
      html += renderCard(t);
    }
    html += `</div>`;
  }

  list.innerHTML = html;
}

function renderCard(t) {
  const statusClass = t.status === "done" ? "status-checkbox--done" : t.status === "doing" ? "status-checkbox--doing" : t.status === "waiting" ? "status-checkbox--waiting" : "";
  const cardClass = [
    "task-card",
    t.root ? "task-card--root" : "task-card--child",
    t.overdue ? "overdue" : "",
    t.status === "done" ? "task-card--done" : "",
    selectedId === t.id ? "selected" : ""
  ].filter(Boolean).join(" ");

  const pColor = PRIORITY_COLORS[t.priority];
  const badgeBg = t.priority === "none" ? "transparent" : pColor + "22";
  const badgeColor = t.priority === "none" ? "inherit" : pColor;

  const dueText = t.due ? formatDate(t.due, t.overdue) : "";
  const contextText = t.context ? t.context.replace(/\|/g, ", ") : "";

  return `
    <div class="${cardClass}" onclick="selectTask(${t.id})" style="border-left-color:${selectedId===t.id ? 'var(--b3-theme-primary)' : pColor === 'transparent' ? 'transparent' : pColor + '44'}">
      <span class="status-checkbox ${statusClass}" onclick="event.stopPropagation()"></span>
      <div class="task-card__body">
        <div class="task-card__title-row">
          <span class="task-card__title">${t.title}</span>
          ${t.priority !== "none" ? `<span class="task-card__priority-badge" style="background:${badgeBg};color:${badgeColor}">${PRIORITY_LABELS[t.priority]}</span>` : ""}
        </div>
        <div class="task-card__meta">
          ${dueText ? `<span class="task-card__due ${t.overdue ? "overdue" : ""}">📅 ${dueText}</span>` : ""}
          ${contextText ? `<span class="task-card__context">🏷 ${contextText}</span>` : ""}
          <span class="task-card__stats">⭐${t.importance} 📊${t.effort}</span>
        </div>
      </div>
    </div>`;
}

function formatDate(d, overdue) {
  const parts = d.split("-");
  return `${parts[1]}/${parts[2]}` + (overdue ? " (逾期)" : "");
}

function selectTask(id) {
  if (selectedId === id) { closeDetail(); return; }
  selectedId = id;
  const t = TASKS.find(x => x.id === id);
  if (!t) return;

  // Update detail pane
  document.getElementById("detailTitle").value = t.title;
  const sc = document.getElementById("detailStatus");
  sc.className = "status-checkbox " + (t.status==="done"?"status-checkbox--done":t.status==="doing"?"status-checkbox--doing":t.status==="waiting"?"status-checkbox--waiting":"");
  const meta = document.getElementById("detailMeta");
  meta.innerHTML = `${PRIORITY_LABELS[t.priority]}优先级 · ⭐${t.importance} 📊${t.effort}`;

  // Open detail pane
  document.getElementById("detailPane").classList.add("open");
  renderTasks();
}

function closeDetail() {
  selectedId = null;
  document.getElementById("detailPane").classList.remove("open");
  renderTasks();
}

function switchView(el, view) {
  document.querySelectorAll(".nav-rail__item").forEach(n => n.classList.remove("active"));
  el.classList.add("active");
}

// ESC to close
document.addEventListener("keydown", e => { if (e.key === "Escape") closeDetail(); });

renderTasks();
</script>
</body>
</html>
